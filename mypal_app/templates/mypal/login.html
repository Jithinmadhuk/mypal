<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mypal – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0e1117; --surface:#161c27; --surface2:#1e2738; --border:#2a3347; --mint:#5eead4; --lavender:#a78bfa; --text:#e2e8f0; --muted:#64748b; --rose:#f43f5e; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nunito',sans-serif; background:radial-gradient(ellipse at 50% 0%, #1a1f3a 0%, var(--bg) 70%); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:48px 40px; max-width:400px; width:100%; text-align:center; box-shadow:0 32px 80px rgba(0,0,0,0.5); }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .pal { animation:float 3s ease-in-out infinite; margin-bottom:20px; }
  .title { font-family:'Fredoka One',cursive; font-size:40px; background:linear-gradient(135deg,var(--mint),var(--lavender)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:6px; }
  .subtitle { color:var(--muted); font-size:14px; margin-bottom:28px; }
  label { font-weight:800; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; text-align:left; display:block; margin-bottom:6px; }
  input { width:100%; background:var(--surface2); border:2px solid var(--border); border-radius:12px; color:var(--text); font-family:'Nunito',sans-serif; font-size:15px; font-weight:600; padding:13px 16px; outline:none; transition:border-color .2s; margin-bottom:16px; }
  input:focus { border-color:var(--lavender); }
  .btn { width:100%; background:linear-gradient(135deg,var(--lavender),var(--mint)); border:none; border-radius:12px; color:#0e1117; font-family:'Fredoka One',cursive; font-size:18px; padding:15px; cursor:pointer; transition:all .2s; }
  .btn:hover { transform:translateY(-2px); }
  .link { margin-top:16px; font-size:13px; color:var(--muted); }
  .link a { color:var(--lavender); text-decoration:none; font-weight:700; }
  .error { color:var(--rose); font-size:13px; font-weight:700; margin-bottom:12px; padding:10px; background:#f43f5e22; border-radius:8px; }
</style>
</head>
<body>
<div class="card">
  <svg class="pal" width="90" height="90" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="44" fill="#1e2738" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="50" cy="50" r="38" fill="#161c27"/>
    <ellipse cx="20" cy="28" rx="11" ry="15" fill="#1e2738" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="80" cy="28" rx="11" ry="15" fill="#1e2738" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="20" cy="28" rx="6" ry="9" fill="#a78bfa" opacity="0.4"/>
    <ellipse cx="80" cy="28" rx="6" ry="9" fill="#a78bfa" opacity="0.4"/>
    <ellipse cx="38" cy="48" rx="7" ry="8" fill="#e2e8f0"/>
    <ellipse cx="62" cy="48" rx="7" ry="8" fill="#e2e8f0"/>
    <circle cx="39" cy="49" r="4" fill="#1a1f3a"/>
    <circle cx="63" cy="49" r="4" fill="#1a1f3a"/>
    <circle cx="41" cy="47" r="1.5" fill="white"/>
    <circle cx="65" cy="47" r="1.5" fill="white"/>
    <path d="M40 60 Q50 68 60 60" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="30" cy="58" rx="7" ry="4" fill="#fb923c" opacity="0.3"/>
    <ellipse cx="70" cy="58" rx="7" ry="4" fill="#fb923c" opacity="0.3"/>
  </svg>
  <div class="title">Welcome Back!</div>
  <div class="subtitle">Your Pal missed you 🐾</div>
  {% if messages %}
    {% for message in messages %}<div class="error">{{ message }}</div>{% endfor %}
  {% endif %}
  <form method="post" style="text-align:left;">
    {% csrf_token %}
    <label>Username</label>
    <input type="text" name="username" placeholder="Your username" required autofocus>
    <label>Password</label>
    <input type="password" name="password" placeholder="Your password" required>
    <button type="submit" class="btn">Login 🚀</button>
  </form>
  <div class="link">New here? <a href="{% url 'register' %}">Create an account</a></div>
</div>
</body>
</html>
